<!-- Optimized and documented structure -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Moon Escape - A space survival game">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/moon/1.png">
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/game.css">
    
    <title>Moon Escape</title>
</head>
<body>
    <!-- Background Layers -->
    <div id="background" class="sys-layer-bg"></div>
    <div id="veil" class="sys-layer-overlay"></div>

    <!-- Main Menu Screen -->
    <div id="menu" role="main">
        <h1 id="moonTitle">
            <span id="moonTextLeft" class="titleText">Moon</span>
            <span id="moonWrap">
                <canvas id="moonCanvas" aria-label="Moon Animation"></canvas>
                <svg id="moonPlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3" role="button" aria-label="Play Game">
                    <path d="M320-203v-560l440 280-440 280Zm60-280Zm0 171 269-171-269-171v342Z" />
                </svg>
            </span>
            <span id="moonTextRight" class="titleText">Escape</span>
        </h1>

        <!-- Settings Button -->
        <div id="settingsBtn" role="button" aria-label="Open Settings">
            <img src="./assets/Icons/Circle01.png" alt="" id="setBg" aria-hidden="true">
            <img src="./assets/Icons/Icon18.png" alt="Settings Icon" id="setIcon">
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings" class="modal" role="dialog" aria-hidden="true" aria-labelledby="settingsHeading">
        <h1 id="settingsHeading">Settings</h1>
        <h2>Audio</h2>
        <div class="line" aria-hidden="true"></div>
        <div id="audioUI">
            <!-- Music Control -->
            <div id="music" role="group" aria-label="Music Volume">
                <span class="audioIcon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                        <path d="M360-120H200q-33 0-56.5-23.5T120-200v-280q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-840q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-480v280q0 33-23.5 56.5T760-120H600v-320h160v-40q0-117-81.5-198.5T480-760q-117 0-198.5 81.5T200-480v40h160v320Zm-80-240h-80v160h80v-160Zm400 0v160h80v-160h-80Zm-400 0h-80 80Zm400 0h80-80Z" />
                    </svg>
                </span>
                <span class="audioLabel">Music</span>
                <div class="slider" tabindex="0" role="slider" aria-label="Adjust Music"><span id="musicSlider" class="sliderKnob"></span></div>
            </div>
            <!-- SFX Control -->
            <div id="sfx" role="group" aria-label="SFX Volume">
                <span class="audioIcon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
                        <path d="M640-440v-80h160v80H640Zm48 280-128-96 48-64 128 96-48 64Zm-80-480-48-64 128-96 48 64-128 96ZM120-360v-240h160l200-200v640L280-360H120Zm280-246-86 86H200v80h114l86 86v-252ZM300-480Z" />
                    </svg>
                </span>
                <span class="audioLabel">SFX</span>
                <div class="slider" tabindex="0" role="slider" aria-label="Adjust SFX"><span id="sfxSlider" class="sliderKnob"></span></div>
            </div>
        </div>
        <h2>Credits</h2>
        <div class="line" aria-hidden="true"></div>
        <h3>A game by <a href="https://github.com/DaOnlyDelta/MoonInvasion" target="_blank" rel="noopener noreferrer">Enej Leskovar</a></h3>
        <div id="closeSettings" class="close-btn" role="button" tabindex="0">Close</div>
    </div>

    <!-- Instructions Modal -->
    <div id="instructions" class="modal" role="dialog" aria-hidden="true" aria-labelledby="instructionsHeading">
        <h1 id="instructionsHeading">How To Play</h1>
        <h2>Controls</h2>
        <div class="line" aria-hidden="true"></div>
        <div class="instruct-content">
            <p><strong>Move:</strong> <br>W/S or Up/Down Arrows</p>
            <p><strong>Shoot:</strong> <br>Spacebar</p>
        </div>
        <h2>Goal</h2>
        <div class="line" aria-hidden="true"></div>
        <h3>Survive the invasion.</h3>
        <div id="closeInstructions" class="close-btn" role="button" tabindex="0">Continue</div>
    </div>

    <!-- Active Game Container -->
    <div id="game" aria-hidden="true">
        <!-- Parallax Background Elements -->
        <div id="bg">
            <img id="bgEarth" src="./assets/parallax/moon/moon_earth.png" alt="Earth Background">
            <img id="bgFloor" src="./assets/parallax/moon/moon_floor.png" alt="Moon Floor">
            <img id="bgFront1" src="./assets/parallax/moon/moon_front.png" class="bg-parallax-front" alt="">
            <img id="bgFront2" src="./assets/parallax/moon/moon_front.png" class="bg-parallax-front" alt="">
            <img id="bgMid1" src="./assets/parallax/moon/moon_mid.png" class="bg-parallax-mid" alt="">
            <img id="bgMid2" src="./assets/parallax/moon/moon_mid.png" class="bg-parallax-mid" alt="">
            <img id="bgBack1" src="./assets/parallax/moon/moon_back.png" class="bg-parallax-back" alt="">
            <img id="bgBack2" src="./assets/parallax/moon/moon_back.png" class="bg-parallax-back" alt="">
        </div>
        <!-- Rendering Canvases -->
        <canvas id="player" title="Player Canvas"></canvas>
        <canvas id="enemy" title="Enemy Canvas"></canvas>
        <canvas id="lasers" title="Lasers Canvas"></canvas>
    </div>

    <!-- Core Scripts -->
    <script src="js/sound.js"></script>
    <script src="js/player.js"></script>
    <script src="js/lasers.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/game.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
